<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>April Fools! 🃏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="container">
    <div class="jester">🃏</div>
    <h1 class="title">April Fools!</h1>
    <p class="subtitle">You've been fooled... or have you? 😏</p>

    <div class="joke-box">
      <p class="joke-text" id="joke"></p>
      <button class="btn" onclick="newJoke()">Another One! 😂</button>
    </div>

    <div class="icons">
      <span>🎉</span>
      <span>🤡</span>
      <span>🎈</span>
      <span>🥳</span>
      <span>🎊</span>
      <span>😜</span>
      <span>🎭</span>
    </div>

    <p class="footer">Happy April 1st! Made with 🌿 by Sage</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
